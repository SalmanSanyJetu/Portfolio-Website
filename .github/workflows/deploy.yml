name: Deploy React App to GitHub Pages

on:
  push:
    branches: [ "main" ] # Make sure this matches your default branch name (main or master)

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Standard version for Vite apps

      - name: Install Dependencies and Build
        run: |
          npm install
          npm run build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Vite outputs the compiled files to a folder called "dist"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
